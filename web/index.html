<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eve-esi-types ESI request test</title>
  <link rel="icon" type="image/png" href="./assets/eve-icon.png">
  <link rel="stylesheet" href="./index.css">
</head>

<body>
  <div class="container">
    <button id="run-test">Run test</button>
  </div>

  <div class="info">
    <div>example command: <input type="text" class="command" value="browser-sync start -s --port 8080 --no-open --ss &lt;this site directory>" size="72" readonly>
      <button class="copy" onclick="copy('.command', '.')"></button>
    </div>
    then access to <a href="http://localhost:8080/web/?x=1&debug=1">eve-esi-types ESI request test</a>
  </div>

  <div class="log-frame">
    <div class="log-output"></div>
    <div class="cli-input" contenteditable spellcheck="false" data-placeholder='Try: esi.status.get("/status/").then(console.log)'></div>
  </div>

  <footer class="footer"></footer>
  <script type="module" src="./index.mjs"></script>

</body>

</html>
